defaults:
  - model: small
  - training: grpo
  - data: grpo_synthetic
  - _self_

seed: 42
output_dir: outputs/grpo
compile: true
pretrained_checkpoint: null  # path to SFT checkpoint.pt

logging:
  backends:
    - tensorboard
  log_every: 10
  project: minimaker-grpo
  run_name: null

distributed:
  backend: nccl
  fsdp:
    sharding_strategy: FULL_SHARD
    activation_checkpointing: false
